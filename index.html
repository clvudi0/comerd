<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ComeRD — Restaurantes cerca de ti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#f7f2ea;--surface:#fffdf8;--s2:#eee8dc;--ink:#18140e;--ink2:#5c5448;--accent:#b5292a;--gold:#a07820;--green:#2a7a4b;--border:#d8d0be;--r:10px;--shadow:0 2px 12px rgba(0,0,0,.07)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;z-index:9999;transition:opacity .5s,visibility .5s}
#loading.hidden{opacity:0;visibility:hidden;pointer-events:none}
.load-brand{font-family:'Cormorant Garamond',serif;font-size:3.5rem;color:var(--accent);line-height:1;letter-spacing:-.02em}
.load-brand span{color:var(--ink)}
.load-sub{font-size:.8rem;text-transform:uppercase;letter-spacing:.15em;color:var(--ink2)}
.ring{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:1rem;flex-wrap:wrap;box-shadow:var(--shadow);z-index:100}
.brand-h{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;line-height:1;color:var(--ink)}
.brand-h em{color:var(--accent);font-style:normal}
.brand-sub{font-size:.68rem;color:var(--ink2);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.loc-pill{display:flex;align-items:center;gap:.5rem;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:.4rem 1rem;font-size:.82rem;color:var(--gold);font-weight:500;white-space:nowrap}
.loc-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden}

/* SEARCH */
.search-wrap{padding:.8rem;border-bottom:1px solid var(--border);position:relative}
.search-wrap input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.55rem 1rem .55rem 2.2rem;font-family:'Outfit',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:1.6rem;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none}

/* FILTERS */
.filters{border-bottom:1px solid var(--border);padding:.65rem .8rem;display:flex;flex-direction:column;gap:.55rem}
.filter-row{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.filter-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);white-space:nowrap;min-width:48px}
.filter-chips{display:flex;gap:.3rem;flex-wrap:wrap}
.chip{background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:.22rem .7rem;font-size:.72rem;color:var(--ink2);cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.chip.gold.active{background:var(--gold);border-color:var(--gold);color:#fff}
.chip.green.active{background:var(--green);border-color:var(--green);color:#fff}

/* CATEGORIES */
.cats-wrap{padding:.65rem .8rem;border-bottom:1px solid var(--border);display:flex;gap:.3rem;flex-wrap:wrap}

/* SORT */
.sort-row{display:flex;gap:.3rem;align-items:center;padding:.45rem .8rem;border-bottom:1px solid var(--border);background:var(--s2)}
.sort-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);margin-right:.2rem}
.sort-btn{background:transparent;border:1px solid var(--border);border-radius:100px;padding:.2rem .65rem;font-size:.7rem;color:var(--ink2);cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif}
.sort-btn:hover,.sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* RESULTS BAR */
.results-bar{padding:.45rem .8rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.results-bar span{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2)}
#resultsCount{color:var(--accent);font-weight:600;font-size:.8rem}

/* LIST */
.list{flex:1;overflow-y:auto;padding:.65rem;display:flex;flex-direction:column;gap:.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.8rem .95rem;cursor:pointer;transition:all .2s;animation:fadeUp .35s ease both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s}
.card:hover{border-color:var(--accent);box-shadow:0 3px 16px rgba(181,41,42,.1);transform:translateY(-1px)}
.card:hover::before{background:var(--accent)}
.card.alta::before{background:var(--gold)}
.card.alta{border-left-color:rgba(160,120,32,.3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.3rem}
.card-name{font-weight:600;font-size:.91rem;line-height:1.3;flex:1}
.gama-badge{font-size:.62rem;font-weight:600;padding:.16rem .5rem;border-radius:100px;white-space:nowrap;flex-shrink:0}
.gama-alta{background:#fdf3d0;color:var(--gold);border:1px solid #e8d080}
.gama-media{background:#fde8e8;color:var(--accent);border:1px solid #f0b0b0}
.gama-accesible{background:#e8f5ee;color:var(--green);border:1px solid #a0d4b8}

.card-meta{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;margin-bottom:.25rem}
.badge{font-size:.66rem;padding:.14rem .48rem;border-radius:100px;background:var(--s2);border:1px solid var(--border);color:var(--ink2)}
.dist{font-size:.7rem;color:var(--ink2);margin-left:auto}
.card-addr,.card-phone{margin-top:.2rem;font-size:.73rem;color:var(--ink2);line-height:1.4}
.card-desc{margin-top:.38rem;font-size:.73rem;color:var(--ink2);font-style:italic;line-height:1.4;border-top:1px solid var(--border);padding-top:.38rem}

/* MSG */
.msg{padding:2rem 1rem;text-align:center;color:var(--ink2)}
.msg .ico{font-size:2rem;margin-bottom:.7rem}
.msg h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--ink);margin-bottom:.4rem}
.msg p{font-size:.8rem;line-height:1.6}

/* MAP */
#map{flex:1;z-index:1}
.leaflet-tile{filter:saturate(.88) brightness(.97)}
.leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important}
.leaflet-popup-content{font-family:'Outfit',sans-serif!important;font-size:.84rem!important;line-height:1.5!important}
.popup-name{font-weight:600;color:#18140e}
.popup-cat{font-size:.72rem;color:#5c5448}
.popup-gama{font-size:.7rem;margin-top:.2rem;font-weight:600}

.marker-alta{background:#a07820;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.marker-media{background:#b5292a;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.marker-accesible{background:#2a7a4b;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.marker-osm{background:#888;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.25)}

@media(max-width:700px){html,body{overflow:auto}.layout{grid-template-columns:1fr;overflow:visible}#map{height:300px}.sidebar{max-height:520px}}
</style>
</head>
<body>

    </div>
  </aside>

  <div id="map"></div>
</div>

// STATE
let map, allRestaurants=[], markers=[];
let userLat, userLng;
let activeCategory='Todos', activeGama='Todos', activeSort='gama';

// BOOT
window.addEventListener('DOMContentLoaded', () => {
  buildCategories();
  if (!navigator.geolocation) { showError('Tu navegador no soporta geolocalizacion.'); return; }
  navigator.geolocation.getCurrentPosition(onPosition, onGeoError, {enableHighAccuracy:true,timeout:15000,maximumAge:0});
});

function onPosition(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  initMap(userLat, userLng);
  reverseGeocode(userLat, userLng);
  fetchAndMerge(userLat, userLng);
}

function onGeoError(err) {
  hideLoading();
  const msgs={1:'Permiso denegado.',2:'Posicion no disponible.',3:'Tiempo agotado.'};
  showSidebarMsg('Ubicacion bloqueada', msgs[err.code]||'Error.');
}

// MAP
function initMap(lat, lng) {
  map = L.map('map').setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://osm.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(map);
  const youIcon = L.divIcon({className:'',html:`<div style="width:16px;height:16px;background:#b5292a;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
  L.marker([lat,lng],{icon:youIcon}).addTo(map).bindPopup('<b>Tu estas aqui</b>');
  L.circle([lat,lng],{radius:RADIUS_M,color:'#b5292a',fillColor:'#b5292a',fillOpacity:.04,weight:1,dashArray:'5'}).addTo(map);
}

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`);
    const d = await r.json();
    const city = d.address.city||d.address.town||d.address.village||d.address.municipality||'RD';
    document.getElementById('cityName').textContent = city;
  } catch { document.getElementById('cityName').textContent = 'RD'; }
}

// FETCH + MERGE
async function fetchAndMerge(lat, lng) {
  setLoadMsg('Buscando restaurantes...');
  const q=`[out:json][timeout:30];(node["amenity"="restaurant"](around:${RADIUS_M},${lat},${lng});node["amenity"="fast_food"](around:${RADIUS_M},${lat},${lng});node["amenity"="cafe"](around:${RADIUS_M},${lat},${lng});node["amenity"="bar"](around:${RADIUS_M},${lat},${lng}););out body;`;
  let osmNew = [];
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)});
    const data = await res.json();
    const osmResults = data.elements.map(parseOSM).filter(Boolean);
    const dbNames = new Set(DB.map(r=>r.name.toLowerCase()));
    osmNew = osmResults.filter(r=>!dbNames.has(r.name.toLowerCase()));
  } catch(e) {}
  const dbWithDist = DB.map(r=>({...r,dist:haversine(lat,lng,r.lat,r.lng)}));
  allRestaurants = [...dbWithDist,...osmNew];
  hideLoading();
  applyFilters();
  renderMarkers(allRestaurants);
}

function parseOSM(el) {
  if(!el.lat||!el.lon) return null;
  const t=el.tags||{};
  const name=t.name||t['name:es']||'';
  if(!name) return null;
  const cuisine=t.cuisine||'';
  const amenity=t.amenity||'';
  const cat=detectCat(cuisine,amenity);
  const dist=haversine(userLat,userLng,el.lat,el.lon);
  const addr=[t['addr:street'],t['addr:housenumber']].filter(Boolean).join(' ')||t['addr:full']||'';
  const phone=t.phone||t['contact:phone']||'';
  return {id:'osm-'+el.id,name,cat,gama:null,addr,phone,desc:'',dist,lat:el.lat,lng:el.lon,cuisine};
}

function detectCat(cuisine, amenity) {
  const c=(cuisine+' '+amenity).toLowerCase();
  if(['dominican','caribbean','comida_criolla','local'].some(k=>c.includes(k))) return 'Criolla';
  if(['seafood','fish','mariscos'].some(k=>c.includes(k))) return 'Mariscos';
  if(['bbq','grill','steak_house','churrascaria','steak'].some(k=>c.includes(k))) return 'Parrilla';
  if(['pizza','italian'].some(k=>c.includes(k))) return 'Pizza';
  if(['chinese','japanese','sushi','asian','thai','korean'].some(k=>c.includes(k))) return 'Asiatica';
  if(['coffee_shop','specialty_coffee','coffeehouse'].some(k=>c.includes(k))) return 'Cafe';
  if(['bar','pub','lounge','cocktail'].some(k=>c.includes(k))) return 'Bares';
  if(['vegan','vegetarian'].some(k=>c.includes(k))) return 'Vegetariana';
  if(amenity==='fast_food') return 'Fast Food';
  return 'Internacional';
}

// FILTERS + SORT
function applyFilters() {
  const query=document.getElementById('searchInput').value.trim().toLowerCase();
  let items=allRestaurants.filter(r=>{
    const matchCat=activeCategory==='Todos'||r.cat===activeCategory;
    const matchGama=activeGama==='Todos'||r.gama===activeGama;
    const matchQ=!query||r.name.toLowerCase().includes(query)||(r.cat||'').toLowerCase().includes(query)||(r.desc||'').toLowerCase().includes(query);
    return matchCat&&matchGama&&matchQ;
  });
  if(activeSort==='gama'){
    items.sort((a,b)=>{const ga=a.gama!=null?GAMA_ORDER[a.gama]:3,gb=b.gama!=null?GAMA_ORDER[b.gama]:3;return ga-gb;});
  } else if(activeSort==='dist'){
    items.sort((a,b)=>a.dist-b.dist);
  } else if(activeSort==='az'){
    items.sort((a,b)=>a.name.localeCompare(b.name));
  }
  renderList(items);
}

function setGama(btn) {
  document.querySelectorAll('#gamaChips .chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeGama=btn.dataset.gama;
  applyFilters();
}

function setSort(btn) {
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeSort=btn.dataset.sort;
  applyFilters();
}

// RENDER LIST
function renderList(items) {
  const list=document.getElementById('listEl');
  document.getElementById('resultsCount').textContent=`${items.length} lugar${items.length!==1?'es':''}`;
  if(!items.length){list.innerHTML=`<div class="msg"><div class="ico">&#128269;</div><h3>Sin resultados</h3><p>Prueba con otra categoria, gama o busqueda.</p></div>`;return;}
  list.innerHTML='';
  items.forEach((r,i)=>{
    const card=document.createElement('div');
    card.className='card'+(r.gama==='Alta'?' alta':'');
    card.style.animationDelay=`${Math.min(i*20,350)}ms`;
    const gamaHtml=r.gama?`<span class="gama-badge gama-${r.gama.toLowerCase()}">${GAMA_LABEL[r.gama]}</span>`:'';
    card.innerHTML=`
      <div class="card-top">
        <div class="card-name">${r.name}</div>
        ${gamaHtml}
      </div>
      <div class="card-meta">
        <span class="badge">${r.cat}</span>
        ${r.cuisine?`<span class="badge">${r.cuisine}</span>`:''}
        <span class="dist">${formatDist(r.dist)}</span>
      </div>
      ${r.addr?`<div class="card-addr">${r.addr}</div>`:''}
      ${r.phone?`<div class="card-phone">${r.phone}</div>`:''}
      ${r.desc?`<div class="card-desc">${r.desc}</div>`:''}
    `;
    card.addEventListener('click',()=>focusRestaurant(r));
    list.appendChild(card);
  });
}

// MARKERS
function renderMarkers(items) {
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  items.forEach(r=>{
    const cls=r.gama==='Alta'?'marker-alta':r.gama==='Media'?'marker-media':r.gama==='Accesible'?'marker-accesible':'marker-osm';
    const size=r.gama==='Alta'?14:10;
    const icon=L.divIcon({className:'',html:`<div class="${cls}" style="width:${size}px;height:${size}px;cursor:pointer"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
    const m=L.marker([r.lat,r.lng],{icon,riseOnHover:true})
      .addTo(map)
      .bindPopup(`<div class="popup-name">${r.name}</div><div class="popup-cat">${r.cat}</div>${r.gama?`<div class="popup-gama" style="color:${GAMA_COLOR[r.gama]}">${GAMA_LABEL[r.gama]}</div>`:''}${r.addr?`<div style="font-size:.72rem;color:#888;margin-top:.2rem">${r.addr}</div>`:''}`);
    m._rid=r.id;
    markers.push(m);
  });
}

function focusRestaurant(r) {
  map.flyTo([r.lat,r.lng],18,{duration:.8});
  setTimeout(()=>{const m=markers.find(m=>m._rid===r.id);if(m)m.openPopup();},850);
}

// CATEGORIES
function buildCategories() {
  const el=document.getElementById('catsEl');
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='chip'+(cat==='Todos'?' active':'');
    btn.textContent=cat;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#catsEl .chip').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory=cat;
      applyFilters();
    });
    el.appendChild(btn);
  });
}

// UTILS
function haversine(la1,lo1,la2,lo2){const R=6371000,r=Math.PI/180,dLat=(la2-la1)*r,dLon=(lo2-lo1)*r,a=Math.sin(dLat/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function formatDist(m){return m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`}
function setLoadMsg(msg){document.getElementById('loadMsg').textContent=msg}
function hideLoading(){document.getElementById('loading').classList.add('hidden')}
function showError(msg){hideLoading();showSidebarMsg('Error',msg)}
function showSidebarMsg(title,text){document.getElementById('listEl').innerHTML=`<div class="msg"><div class="ico">&#128205;</div><h3>${title}</h3><p>${text}</p></div>`}
</script>
